<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lizard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #fff;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 60px;
    }

    .btn-lizard-wrap {
      width: 100%;
      max-width: 480px;
      margin-bottom: 32px;
    }

    .btn-lizard-wrap .btn {
      width: 100%;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 480px;
    }

    .btn {
      background: #000;
      border: 2px solid #fff;
      border-radius: 24px;
      padding: 28px 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn:active,
    .btn.playing {
      transform: scale(0.93);
    }

    .btn .emoji {
      font-size: clamp(3rem, 10vw, 5rem);
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      transition: transform 0.15s ease;
    }

    .btn.playing .emoji {
      transform: scale(1.15);
    }

    .btn .label {
      color: #fff;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .btn.playing {
      border-color: #fff;
      box-shadow: 0 0 24px rgba(255,255,255,0.5), inset 0 0 24px rgba(255,255,255,0.04);
      background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 360px) {
      .buttons { gap: 16px; }
      .btn { padding: 20px 12px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <h1>Lizard</h1>

  <div class="btn-lizard-wrap">
    <button class="btn btn-lizard" id="btn-lizard" aria-label="Lizard">
      <span class="emoji">🦎</span>
      <span class="label">Lizard</span>
    </button>
  </div>

  <div class="buttons">
    <button class="btn btn-choco" id="btn-choco" aria-label="Chocolate">
      <span class="emoji">🍫</span>
      <span class="label">Choco</span>
    </button>
    <button class="btn btn-yum" id="btn-yum" aria-label="Yum">
      <span class="emoji">😋</span>
      <span class="label">Yum</span>
    </button>
    <button class="btn btn-kiss" id="btn-kiss" aria-label="Kiss">
      <span class="emoji">💋</span>
      <span class="label">Kiss</span>
    </button>
    <button class="btn btn-heart" id="btn-heart" aria-label="Heart">
      <span class="emoji">💕</span>
      <span class="label">Heart</span>
    </button>
  </div>

  <script>
    // Web Audio API sound engine
    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume in case it was suspended (autoplay policy)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function createGain(ctx, volume, attackTime, releaseTime, totalTime) {
      const gain = ctx.createGain();
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + attackTime);
      gain.gain.setValueAtTime(volume, now + totalTime - releaseTime);
      gain.gain.linearRampToValueAtTime(0, now + totalTime);
      return gain;
    }

    // 🦎 Lizard – quick reptilian rattle with a descending glide
    function playLizard() {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const duration = 0.9;

      // Buzzy sawtooth glide
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + duration);

      // Noise layer for a scaly texture
      const bufSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(800, now);
      filter.frequency.exponentialRampToValueAtTime(200, now + duration);
      filter.Q.value = 3;

      const oscGain = createGain(ctx, 0.35, 0.01, 0.3, duration);
      const noiseGain = createGain(ctx, 0.15, 0.01, 0.2, duration);

      osc.connect(oscGain);
      noise.connect(filter);
      filter.connect(noiseGain);
      oscGain.connect(ctx.destination);
      noiseGain.connect(ctx.destination);

      osc.start(now);
      noise.start(now);
      osc.stop(now + duration);
      noise.stop(now + duration);
    }

    // 🍫 Chocolate – warm, rich low oscillator with a gentle vibrato
    function playChoco() {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const duration = 1.2;

      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(130, now);
      osc.frequency.exponentialRampToValueAtTime(110, now + duration);

      // Sub-bass
      const osc2 = ctx.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(260, now);
      osc2.frequency.exponentialRampToValueAtTime(220, now + duration);

      const gain = createGain(ctx, 0.5, 0.04, 0.4, duration);
      const gain2 = createGain(ctx, 0.25, 0.04, 0.4, duration);

      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(ctx.destination);
      gain2.connect(ctx.destination);

      osc.start(now);
      osc2.start(now);
      osc.stop(now + duration);
      osc2.stop(now + duration);
    }

    // 😋 Yum – bright, happy ascending arpeggio
    function playYum() {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      const noteDur = 0.18;

      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = freq;

        const gain = ctx.createGain();
        const t = now + i * noteDur;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
        gain.gain.setValueAtTime(0.4, t + noteDur * 0.6);
        gain.gain.linearRampToValueAtTime(0, t + noteDur);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + noteDur);
      });
    }

    // 💋 Kiss – percussive "smack" using filtered noise + pitched tone
    function playKiss() {
      const ctx = getCtx();
      const now = ctx.currentTime;

      // White noise burst
      const bufSize = ctx.sampleRate * 0.12;
      const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1);
      }

      const noise = ctx.createBufferSource();
      noise.buffer = buffer;

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(1200, now);
      filter.frequency.exponentialRampToValueAtTime(400, now + 0.12);
      filter.Q.value = 1.5;

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.8, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(ctx.destination);

      // Pitch "smack"
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);

      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.5, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

      osc.connect(oscGain);
      oscGain.connect(ctx.destination);

      noise.start(now);
      osc.start(now);
      osc.stop(now + 0.15);
    }

    // 💕 Heart – gentle, romantic chime chord
    function playHeart() {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const chord = [523.25, 659.25, 783.99]; // C5, E5, G5
      const duration = 1.8;

      chord.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        // Add slight detuning for warmth
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 1.003;

        const gain = createGain(ctx, 0.22, 0.01, 0.8, duration);
        const gain2 = createGain(ctx, 0.12, 0.01, 0.8, duration);

        // Slight stagger
        const t = now + i * 0.06;

        osc.connect(gain);
        osc2.connect(gain2);
        gain.connect(ctx.destination);
        gain2.connect(ctx.destination);

        osc.start(t);
        osc2.start(t);
        osc.stop(t + duration);
        osc2.stop(t + duration);
      });
    }

    const sounds = {
      'btn-lizard': playLizard,
      'btn-choco': playChoco,
      'btn-yum':   playYum,
      'btn-kiss':  playKiss,
      'btn-heart': playHeart,
    };

    const speechLabels = {
      'btn-lizard': 'Lizard',
      'btn-choco': 'Chocolate',
      'btn-yum':   'Yum',
      'btn-kiss':  'Kiss',
      'btn-heart': 'Heart',
    };

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      window.speechSynthesis.speak(utter);
    }

    document.querySelectorAll('.btn').forEach(btn => {
      const playFn = sounds[btn.id];
      const label = speechLabels[btn.id];

      function handlePlay() {
        playFn();
        speak(label);
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 300);
      }

      btn.addEventListener('click', handlePlay);
      // Support touch with no delay; use touchend so scroll is not blocked
      let touchMoved = false;
      btn.addEventListener('touchstart', () => { touchMoved = false; }, { passive: true });
      btn.addEventListener('touchmove', () => { touchMoved = true; }, { passive: true });
      btn.addEventListener('touchend', e => {
        if (!touchMoved) {
          e.preventDefault(); // prevent click from firing twice
          handlePlay();
        }
      }, { passive: false });
    });
  </script>
</body>
</html>
